name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub release tag"
        required: true
        default: "v1.0"

permissions:
  contents: write

jobs:
  linux:
    name: Linux release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libopenblas-dev \
            liblapack-dev \
            libeigen3-dev \
            libboost-dev \
            luajit \
            libluajit-5.1-dev \
            luarocks \
            gnuplot \
            pandoc \
            universal-ctags

      - name: Build
        run: |
          xmake f -m release --native=n --fast_math=n --confirm=n
          xmake

      - name: Test
        run: xmake run test-all

      - name: Package
        run: xmake run package-release

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: quantum-analyzer-linux
          path: dist/quantum-analyzer-1.0-linux-x86_64.tar.gz
          if-no-files-found: error

  windows:
    name: Windows release package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Install MSYS2/UCRT64 dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          pacboy: >-
            toolchain:p
            openblas:p
            lapack:p
            eigen3:p
            boost:p
            luajit:p
            gnuplot:p

      - name: Build
        shell: msys2 {0}
        run: |
          xmake f -m release -p mingw --use_vcpkg=n --native=n --fast_math=n --confirm=n
          xmake

      - name: Test app
        shell: msys2 {0}
        run: xmake run test-app

      - name: Package
        shell: msys2 {0}
        run: xmake run package-release

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: quantum-analyzer-windows
          path: dist/quantum-analyzer-1.0-windows-x86_64.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "Quantum Analyzer ${RELEASE_TAG#v}" \
              --notes "Initial release."
          fi
